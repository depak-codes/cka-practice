apiVersion: apps/v1
kind: Deployment
metadata:
  name: mariadb       # Script looks for deployment named 'mariadb'
  namespace: mariadb
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mariadb    # Script looks for pods with this label
  template:
    metadata:
      labels:
        app: mariadb  # This MUST match the selector above
    spec:
      containers:
      - name: mariadb
        image: mariadb:10.5
        env:
        - name: MARIADB_ROOT_PASSWORD
          value: "password123"
        volumeMounts:
        - name: mariadb-storage
          mountPath: /var/lib/mysql
      volumes:
      - name: mariadb-storage
        persistentVolumeClaim:
          claimName: mariadb
